<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kidoo – At Your Service</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #161a22; --bubble-bot: #1e2330;
    --bubble-user: #6c47ff; --accent: #a78bfa; --text: #e8eaf0;
    --muted: #7a7f93; --border: #252a38; --online: #22c55e;
    --font: "Plus Jakarta Sans", sans-serif;
  }
  body { background: var(--bg); font-family: var(--font); height: 100dvh; display: flex; align-items: center; justify-content: center; }
  .phone { width: 100%; max-width: 420px; height: 100dvh; max-height: 860px; background: var(--surface); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 80px rgba(108,71,255,0.15); }
  @media (min-width: 480px) { .phone { border-radius: 28px; height: 860px; } }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 18px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; flex-shrink: 0; position: relative; border: 2px solid #6c47ff; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar::after { content: ""; position: absolute; bottom: 1px; right: 1px; width: 10px; height: 10px; background: var(--online); border-radius: 50%; border: 2px solid var(--surface); }
  .header-info { flex: 1; }
  .header-info h1 { font-size: 15px; font-weight: 700; color: var(--text); }
  .header-info p { font-size: 11.5px; color: var(--online); font-weight: 500; margin-top: 1px; }
  .icon-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--border); border: none; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .api-banner { background: linear-gradient(90deg, rgba(108,71,255,0.15), rgba(56,189,248,0.1)); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .api-banner input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 7px 12px; font-size: 12px; color: var(--text); font-family: var(--font); outline: none; }
  .api-banner input:focus { border-color: var(--accent); }
  .api-banner input::placeholder { color: var(--muted); }
  .save-btn { background: var(--bubble-user); border: none; border-radius: 10px; padding: 7px 14px; color: white; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font); white-space: nowrap; }
  .messages { flex: 1; overflow-y: auto; padding: 16px 14px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .date-divider { text-align: center; font-size: 11px; color: var(--muted); padding: 4px 12px; background: var(--border); border-radius: 20px; align-self: center; margin: 4px 0; }
  .msg-row { display: flex; align-items: flex-end; gap: 8px; animation: popIn 0.25s ease; }
  @keyframes popIn { from { opacity: 0; transform: translateY(8px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-avatar { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 1px solid #6c47ff; }
  .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .bubble { max-width: 72%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.55; color: var(--text); }
  .msg-row.bot .bubble { background: var(--bubble-bot); border-bottom-left-radius: 5px; }
  .msg-row.user .bubble { background: var(--bubble-user); border-bottom-right-radius: 5px; color: #fff; }
  .time { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: right; }
  .msg-row.user .time { color: rgba(255,255,255,0.6); }
  .typing { display: flex; align-items: center; gap: 8px; animation: popIn 0.25s ease; }
  .typing-dots { background: var(--bubble-bot); border-radius: 18px; border-bottom-left-radius: 5px; padding: 12px 16px; display: flex; gap: 5px; align-items: center; }
  .typing-dots span { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); background: var(--accent); } }
  .input-area { border-top: 1px solid var(--border); padding: 12px 14px; display: flex; align-items: flex-end; gap: 10px; background: var(--surface); flex-shrink: 0; }
  .input-wrap { flex: 1; background: var(--bubble-bot); border: 1px solid var(--border); border-radius: 22px; padding: 10px 16px; display: flex; align-items: center; gap: 10px; transition: border-color 0.2s; }
  .input-wrap:focus-within { border-color: var(--accent); }
  #userInput { flex: 1; background: none; border: none; outline: none; font-size: 14px; color: var(--text); font-family: var(--font); resize: none; max-height: 100px; line-height: 1.5; }
  #userInput::placeholder { color: var(--muted); }
  .send-btn { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #6c47ff, #38bdf8); border: none; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.15s, opacity 0.2s; box-shadow: 0 4px 16px rgba(108,71,255,0.4); }
  .send-btn:hover { transform: scale(1.08); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .mic-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--border); border: none; color: var(--muted); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .mic-btn.listening { background: #ff4444; color: white; animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,68,68,0.4); } 50% { transform: scale(1.08); box-shadow: 0 0 0 8px rgba(255,68,68,0); } }
  .speaking-bar { display: none; align-items: center; gap: 6px; padding: 6px 14px; background: rgba(108,71,255,0.1); border-top: 1px solid var(--border); font-size: 12px; color: var(--accent); flex-shrink: 0; }
  .speaking-bar.active { display: flex; }
  .speaking-bar span { display: flex; gap: 3px; }
  .speaking-bar span i { width: 3px; height: 14px; background: var(--accent); border-radius: 3px; animation: wave 0.8s infinite; display: inline-block; }
  .speaking-bar span i:nth-child(2) { animation-delay: 0.1s; }
  .speaking-bar span i:nth-child(3) { animation-delay: 0.2s; }
  .speaking-bar span i:nth-child(4) { animation-delay: 0.3s; }
  @keyframes wave { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1.5); } }
  .api-status { font-size: 10px; color: var(--muted); padding: 4px 16px; background: var(--bg); text-align: center; flex-shrink: 0; }
  .api-status.groq { color: #22c55e; }
  .api-status.gemini { color: #38bdf8; }
  .api-status.error { color: #ff4444; }
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="avatar">
      <img src="kidoo-logo.png" alt="Kidoo" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%236c47ff%22 rx=%2250%22/><text y=%22.9em%22 font-size=%2260%22 x=%2250%25%22 text-anchor=%22middle%22>🤖</text></svg>'"/>
    </div>
    <div class="header-info">
      <h1>Kidoo</h1>
      <p id="statusText">● Online</p>
    </div>
    <button class="icon-btn" onclick="clearChat()">🗑️</button>
  </div>

  <div class="api-banner">
    <input type="password" id="apiKeyInput" placeholder="Paste Groq or Gemini API key..." />
    <button class="save-btn" onclick="saveKey()">Save</button>
  </div>

  <div class="api-status" id="apiStatus">No key added yet</div>

  <div class="speaking-bar" id="speakingBar">
    <span><i></i><i></i><i></i><i></i></span>
    Kidoo is speaking...
    <button onclick="stopSpeaking()" style="margin-left:auto;background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;">Stop</button>
  </div>

  <div class="messages" id="messages">
    <div class="date-divider">Today</div>
    <div class="msg-row bot">
      <div class="msg-avatar"><img src="kidoo-logo.png" alt="Kidoo" onerror="this.parentElement.innerHTML='🤖'"/></div>
      <div>
        <div class="bubble">Hey! 👋 I'm <strong>Kidoo</strong>. Add your API key above — works with Groq or Gemini, both free! Then we can chat. 😊</div>
        <div class="time">Just now</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Message Kidoo..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="mic-btn" id="micBtn" onclick="toggleVoice()">🎤</button>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  // ============ CONFIG ============
  const LOGO = 'kidoo-logo.png';

  const SYSTEM_PROMPT = `Your name is Kidoo. You are a sweet, calm and cool boy buddy assistant.
Personality:
- You are a boy - warm, chill and supportive like a best male friend
- Talk naturally and smoothly, NEVER use filler words like umm, haaa, uhh, erm
- Keep sentences short, clear and clean
- Be calm, kind and encouraging
- Use light emojis occasionally
- Ask ONE question at a time
- Remember everything in the conversation

Appointment booking flow:
1. Greet calmly, introduce as Kidoo
2. Ask their name, use it throughout
3. Ask what service/appointment needed
4. Ask preferred date
5. Ask preferred time
6. Confirm all details warmly
7. End with calm friendly goodbye

Sound like a real cool guy friend who is reliable and caring.`;

  // ============ STATE ============
  let apiKey = localStorage.getItem('kidoo_key') || '';
  let apiType = localStorage.getItem('kidoo_api_type') || '';
  let conversationHistory = [];
  let isLoading = false;
  let recognition = null;
  let isListening = false;
  const synth = window.speechSynthesis;

  // ============ INIT ============
  if (apiKey) {
    document.getElementById('apiKeyInput').value = '••••••••••••••••';
    updateStatus(apiType, true);
  }

  // Detect API type from key
  function detectAPIType(key) {
    if (key.startsWith('gsk_')) return 'groq';
    if (key.startsWith('AIza')) return 'gemini';
    return 'unknown';
  }

  function updateStatus(type, saved) {
    const el = document.getElementById('apiStatus');
    if (!saved) { el.textContent = 'No key added yet'; el.className = 'api-status'; return; }
    if (type === 'groq') { el.textContent = '⚡ Using Groq (Free)'; el.className = 'api-status groq'; }
    else if (type === 'gemini') { el.textContent = '✨ Using Gemini (Free)'; el.className = 'api-status gemini'; }
    else { el.textContent = '🔑 Key saved'; el.className = 'api-status'; }
  }

  // ============ API CALLS ============
  async function callGroq(messages) {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 300,
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...messages]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.choices[0].message.content;
  }

  async function callGemini(messages) {
    const contents = messages.map(m => ({
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content }]
    }));
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents,
          generationConfig: { maxOutputTokens: 300, temperature: 0.9 }
        })
      }
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.candidates[0].content.parts[0].text;
  }

  async function callAPI(messages) {
    if (apiType === 'groq') return await callGroq(messages);
    if (apiType === 'gemini') return await callGemini(messages);
    // Try Groq first, then Gemini
    try { return await callGroq(messages); }
    catch(e) {
      try { return await callGemini(messages); }
      catch(e2) { throw new Error('Both APIs failed. Check your key!'); }
    }
  }

  // ============ SAVE KEY ============
  function saveKey() {
    const input = document.getElementById('apiKeyInput').value.trim();
    if (input && !input.includes('•')) {
      apiKey = input;
      apiType = detectAPIType(apiKey);
      localStorage.setItem('kidoo_key', apiKey);
      localStorage.setItem('kidoo_api_type', apiType);
      document.getElementById('apiKeyInput').value = '••••••••••••••••';
      updateStatus(apiType, true);
      const msg = "All set! How can I help you today?";
      addBotMessage(msg + " 😊");
      speak(msg);
    } else if (input.includes('•') && apiKey) {
      const msg = "Already good to go. What do you need?";
      addBotMessage(msg + " 👋");
      speak(msg);
    } else {
      alert('Please enter a valid API key!');
    }
  }

  // ============ VOICE ============
  function setupRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    const r = new SR();
    r.continuous = false;
    r.interimResults = false;
    r.lang = 'en-US';
    r.onresult = e => {
      document.getElementById('userInput').value = e.results[0][0].transcript;
      stopListening();
      sendMessage();
    };
    r.onerror = () => stopListening();
    r.onend = () => stopListening();
    return r;
  }

  function toggleVoice() {
    if (isListening) { stopListening(); return; }
    if (!recognition) recognition = setupRecognition();
    if (!recognition) { alert('Voice not supported. Use Chrome!'); return; }
    stopSpeaking();
    isListening = true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micBtn').textContent = '🔴';
    document.getElementById('statusText').textContent = '● Listening...';
    document.getElementById('statusText').style.color = '#ff4444';
    recognition.start();
  }

  function stopListening() {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micBtn').textContent = '🎤';
    document.getElementById('statusText').textContent = '● Online';
    document.getElementById('statusText').style.color = 'var(--online)';
    try { if (recognition) recognition.stop(); } catch(e) {}
  }

  function speak(text) {
    if (!synth) return;
    stopSpeaking();
    const clean = text.replace(/[\u{1F000}-\u{1FFFF}]/gu, '').replace(/[*_#~`]/g, '').trim();
    if (!clean) return;
    const u = new SpeechSynthesisUtterance(clean);
    u.rate = 1.35;
    u.pitch = 0.6;
    u.volume = 1;
    const voices = synth.getVoices();
    const male = voices.find(v => v.name === 'Google UK English Male')
      || voices.find(v => v.name === 'Daniel')
      || voices.find(v => v.name === 'Alex')
      || voices.find(v => v.name.toLowerCase().includes('male'))
      || voices.find(v => v.lang === 'en-GB')
      || voices.find(v => v.lang.startsWith('en'));
    if (male) u.voice = male;
    u.onstart = () => document.getElementById('speakingBar').classList.add('active');
    u.onend = () => document.getElementById('speakingBar').classList.remove('active');
    u.onerror = () => document.getElementById('speakingBar').classList.remove('active');
    synth.speak(u);
  }

  function stopSpeaking() {
    synth.cancel();
    document.getElementById('speakingBar').classList.remove('active');
  }

  // ============ CHAT ============
  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addBotMessage(text) {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.innerHTML = `<div class="msg-avatar"><img src="${LOGO}" alt="K" onerror="this.parentElement.innerHTML='🤖'"/></div><div><div class="bubble">${text}</div><div class="time">${getTime()}</div></div>`;
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addUserMessage(text) {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `<div><div class="bubble">${text}</div><div class="time">${getTime()}</div></div>`;
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const t = document.createElement('div');
    t.className = 'typing'; t.id = 'typingIndicator';
    t.innerHTML = `<div class="msg-avatar"><img src="${LOGO}" alt="K" onerror="this.parentElement.innerHTML='🤖'"/></div><div class="typing-dots"><span></span><span></span><span></span></div>`;
    msgs.appendChild(t);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    if (!apiKey) { alert('Please add your API key first!'); return; }
    addUserMessage(text);
    conversationHistory.push({ role: 'user', content: text });
    input.value = ''; input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    showTyping();
    try {
      const reply = await callAPI(conversationHistory);
      conversationHistory.push({ role: 'assistant', content: reply });
      removeTyping();
      addBotMessage(reply);
      speak(reply);
    } catch(err) {
      removeTyping();
      addBotMessage("Something went wrong. Try again in a moment. 😕");
      console.error(err);
    }
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function clearChat() {
    if (!confirm('Clear the chat?')) return;
    stopSpeaking();
    conversationHistory = [];
    document.getElementById('messages').innerHTML = '<div class="date-divider">Today</div>';
    const msg = "Fresh start. What can I do for you?";
    addBotMessage(msg + " 😊");
    speak(msg);
  }

  synth.onvoiceschanged = () => synth.getVoices();
</script>
</body>
</html>
